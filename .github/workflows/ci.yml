name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.13", "3.14"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies (develop-against-lock, Plan 019 B2)
        run: |
          # The paved installer reads SUITE.lock [spine].version and installs
          # regista-hraedon at that locked release from PyPI (today 0.5.3), then
          # `-e .[dev]`. Same install shape as local `make dev`, so CI and a
          # developer's machine develop against the same shipped substrate. No
          # hardcoded version pin here — it drifts from SUITE.lock silently
          # (this lane was stuck on 0.5.1 while the lock said 0.5.3).
          # tests/test_develop_against_lock.py is the mechanical control.
          python scripts/dev-install.py

      - name: Lint
        run: ruff check src/ tests/

      - name: Type check
        run: mypy src/dossier/

      - name: Test
        run: pytest tests/ -v

  # Identifier gate (Plan 013 WI-4.3) — blocks work-domain identifiers
  identifier-gate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Canonical denylist-driven gate: scans all tracked files for the tokens in
      # the DOSSIER_FORBIDDEN_IDENTIFIERS secret (the shared canonical work-domain
      # set), plus the always-on samples/ guard (no tracked files under gitignored
      # data dirs). No-op until the secret is configured. Replaced the bespoke
      # hardcoded scan, which was miscalibrated — it targeted lab identifiers and
      # forbade the allowed `hraedon` identity while omitting the work-domain token.
      # Single source of truth is ~/.config/agent-suite/forbidden-identifiers;
      # never hand-roll patterns.
      - name: Denylist identifier gate
        env:
          DOSSIER_FORBIDDEN_IDENTIFIERS: ${{ secrets.DOSSIER_FORBIDDEN_IDENTIFIERS }}
        run: python3 scripts/check_committed_identifiers.py

      - name: Scan for secrets
        run: |
          set -e
          # Look for hardcoded secrets: assignments of string/bytes literals to
          # variables whose names suggest sensitive values. Function calls,
          # variable references, and type annotations are not secrets.
          HITS=$(grep -rnE "(password|secret|api_key|apikey|access_token|auth_token|dsn|secret_key|private_key)[[:space:]]*=[[:space:]]*[fb]?[\"']" \
            src/ tests/ --include='*.py' \
            | grep -vE '(test_|example|placeholder|changeme|replace|dummy|sample|TODO|test-session-secret)' \
            || true)
          if [ -n "$HITS" ]; then
            echo "Potential hardcoded secrets found (review each):"
            echo "$HITS"
            exit 1
          fi
          echo "No secrets detected."

  # Container image build + publish (Plan 013 WI-2.1)
  image:
    runs-on: ubuntu-latest
    needs: [check, identifier-gate]
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Read pins from SUITE.lock (TOML)
        id: pin
        run: |
          # SUITE.lock is the TOML [spine] shape (Plan 019 B2). The image installs
          # regista-hraedon from PyPI at [spine].version — no git+SHA build-arg.
          python3 - <<'PY' >> "$GITHUB_OUTPUT"
          import tomllib, pathlib
          lock = tomllib.loads(pathlib.Path("SUITE.lock").read_text())
          print(f"regista_version={lock['spine']['version']}")
          print(f"dossier_version={lock['component']['version']}")
          c = lock["container"]
          print(f"image={c['registry']}/{c['image']}")
          PY

      - name: Build image
        run: |
          docker build \
            --build-arg REGISTA_VERSION=${{ steps.pin.outputs.regista_version }} \
            -t ${{ steps.pin.outputs.image }}:latest \
            -t ${{ steps.pin.outputs.image }}:${{ steps.pin.outputs.dossier_version }}-${{ steps.pin.outputs.regista_version }} \
            .

      - name: Push image
        if: github.ref == 'refs/heads/main'
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
          docker push ${{ steps.pin.outputs.image }}:latest
          docker push ${{ steps.pin.outputs.image }}:${{ steps.pin.outputs.dossier_version }}-${{ steps.pin.outputs.regista_version }}

  # Plan 003 WI-5.1 — prove dossier imports, lints, and runs unit tests on
  # native Windows. Phase 1 (WI-1.1) eliminated the bare os.O_NOFOLLOW crash
  # that made the key-custody and config-load paths un-importable on Windows;
  # this job guards against future non-portable additions (fcntl, etc.).
  # Postgres-dependent tests skip cleanly — no Docker or Postgres on the
  # windows-latest runner (each checks connectivity and calls pytest.skip).
  windows-test:
    runs-on: windows-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies (develop-against-lock, Plan 019 B2)
        run: |
          # Same paved installer as the Linux lane: resolve the spine from
          # SUITE.lock [spine].version, install regista-hraedon at that locked
          # release, then `-e .[dev]`. No hardcoded pin (was stuck on 0.5.1).
          python scripts/dev-install.py

      - name: Lint (ruff)
        run: ruff check src/ tests/

      - name: Type check (mypy)
        run: mypy src/dossier/

      - name: Run tests
        run: pytest tests/ -v --tb=short
