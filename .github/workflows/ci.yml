name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.13", "3.14"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          # regista-hraedon is published on PyPI (renamed distribution; the
          # import name is still `regista`). Pinned to 0.5.1; SUITE.lock still
          # records the source SHA for revision-drift detection. The docker
          # build-arg REGISTA_REF below is used only by the image build job.
          pip install "regista-hraedon==0.5.1"
          pip install -e ".[dev]"

      - name: Lint
        run: ruff check src/ tests/

      - name: Type check
        run: mypy src/dossier/

      - name: Test
        run: pytest tests/ -v

  # Identifier gate (Plan 013 WI-4.3) — blocks work-domain identifiers
  identifier-gate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Canonical denylist-driven gate: scans all tracked files for the tokens in
      # the DOSSIER_FORBIDDEN_IDENTIFIERS secret (the shared canonical work-domain
      # set), plus the always-on samples/ guard (no tracked files under gitignored
      # data dirs). No-op until the secret is configured. Replaced the bespoke
      # hardcoded scan, which was miscalibrated — it targeted lab identifiers and
      # forbade the allowed `hraedon` identity while omitting the work-domain token.
      # Single source of truth is ~/.config/agent-suite/forbidden-identifiers;
      # never hand-roll patterns.
      - name: Denylist identifier gate
        env:
          DOSSIER_FORBIDDEN_IDENTIFIERS: ${{ secrets.DOSSIER_FORBIDDEN_IDENTIFIERS }}
        run: python3 scripts/check_committed_identifiers.py

      - name: Scan for secrets
        run: |
          set -e
          # Look for hardcoded secrets: assignments of string/bytes literals to
          # variables whose names suggest sensitive values. Function calls,
          # variable references, and type annotations are not secrets.
          HITS=$(grep -rnE "(password|secret|api_key|apikey|access_token|auth_token|dsn|secret_key|private_key)[[:space:]]*=[[:space:]]*[fb]?[\"']" \
            src/ tests/ --include='*.py' \
            | grep -vE '(test_|example|placeholder|changeme|replace|dummy|sample|TODO|test-session-secret)' \
            || true)
          if [ -n "$HITS" ]; then
            echo "Potential hardcoded secrets found (review each):"
            echo "$HITS"
            exit 1
          fi
          echo "No secrets detected."

  # Container image build + publish (Plan 013 WI-2.1)
  image:
    runs-on: ubuntu-latest
    needs: [check, identifier-gate]
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Read version pins
        id: pin
        run: |
          dossier_version=$(grep '^version' pyproject.toml | head -1 | awk -F'"' '{print $2}')
          regista_version=$(grep '^ARG REGISTA_VERSION=' Dockerfile | head -1 | cut -d= -f2)
          echo "dossier_version=${dossier_version}" >> "$GITHUB_OUTPUT"
          echo "regista_version=${regista_version}" >> "$GITHUB_OUTPUT"

      - name: Build image
        run: |
          docker build \
            --build-arg REGISTA_VERSION=${{ steps.pin.outputs.regista_version }} \
            -t ghcr.io/hraedon/dossier:latest \
            -t ghcr.io/hraedon/dossier:${{ steps.pin.outputs.dossier_version }} \
            .

      - name: Push image
        if: github.ref == 'refs/heads/main'
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
          docker push ghcr.io/hraedon/dossier:latest
          docker push ghcr.io/hraedon/dossier:${{ steps.pin.outputs.dossier_version }}

  # Plan 003 WI-5.1 — prove dossier imports, lints, and runs unit tests on
  # native Windows. Phase 1 (WI-1.1) eliminated the bare os.O_NOFOLLOW crash
  # that made the key-custody and config-load paths un-importable on Windows;
  # this job guards against future non-portable additions (fcntl, etc.).
  # Postgres-dependent tests skip cleanly — no Docker or Postgres on the
  # windows-latest runner (each checks connectivity and calls pytest.skip).
  windows-test:
    runs-on: windows-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install regista
        shell: bash
        run: |
          python -m pip install --upgrade pip
          # regista-hraedon is published on PyPI (renamed distribution; the
          # import name is still `regista`). Pinned to 0.5.1; SUITE.lock
          # continues to pin the source SHA for revision-drift detection.
          pip install "regista-hraedon==0.5.1"

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Lint (ruff)
        run: ruff check src/ tests/

      - name: Type check (mypy)
        run: mypy src/dossier/

      - name: Run tests
        run: pytest tests/ -v --tb=short
