name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.13", "3.14"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          # regista is a public sibling repo, not on PyPI — install from git.
          # Pinned to a SHA (Plan 013 WI-2.1); update SUITE.lock when bumping.
          REGISTA_REF=$(grep 'ref:' SUITE.lock | head -1 | awk '{print $2}')
          pip install "regista @ git+https://github.com/hraedon/regista.git@${REGISTA_REF}"
          pip install -e ".[dev]"

      - name: Lint
        run: ruff check src/ tests/

      - name: Type check
        run: mypy src/dossier/

      - name: Test
        run: pytest tests/ -v

  # Identifier gate (Plan 013 WI-4.3) — blocks work-domain identifiers
  identifier-gate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Scan for work-domain identifiers
        run: |
          set -e
          # Targeted scan: look for known real hostnames/domains/service-accounts
          # that must never appear in committed files. Case-insensitive to catch
          # uppercase variants. Generic LDAP/AD syntax (DC=, CN=, ldaps://) is
          # allowed when paired with example.com or test.example.
          REAL_PATTERNS='(mvmpostgres|mvmcitest|mvm[a-z]+0[0-9]|hraedon\.com|ad\.hraedon|svc-gpolens|windows-test-host|postgres-host)'
          HITS=$(grep -rniE "$REAL_PATTERNS" src/ tests/ docs/ plans/ deploy/ reflections/ scripts/ githooks/ \
            --include='*.py' --include='*.md' --include='*.yaml' --include='*.yml' \
            --include='*.xml' --include='*.ps1' --include='*.cmd' --include='*.sh' \
            --include='*.txt' --include='*.json' --include='*.toml' --include='*.lock' \
            | grep -v 'publication-review\|filter-repo-replacements\|history-identifier-audit' \
            || true)
          if [ -n "$HITS" ]; then
            echo "Work-domain identifiers found:"
            echo "$HITS"
            exit 1
          fi

          # Broad scan: catch new real identifiers in LDAP/AD patterns.
          # Excludes known-safe placeholders (example.com, test.example).
          BROAD_PATTERNS='(DC=[a-z]+,DC=|CN=[^,]+,OU=|ldaps://[a-z])'
          BROAD_HITS=$(grep -rnE "$BROAD_PATTERNS" src/ tests/ docs/ plans/ deploy/ reflections/ scripts/ \
            --include='*.py' --include='*.md' --include='*.yaml' --include='*.yml' \
            | grep -v 'example\.com\|example\.internal\|test\.example\|DC=test\|DC=example' \
            | grep -v 'publication-review' \
            | grep -v "startswith.*ldaps\|match.*ldaps\|'ldaps://" \
            || true)
          if [ -n "$BROAD_HITS" ]; then
            echo "Potential work-domain identifiers (review):"
            echo "$BROAD_HITS"
            exit 1
          fi
          echo "No work-domain identifiers detected."

      # Denylist-driven gate (Plan 013 WI-4.3): scans all tracked files for
      # identifiers from the DOSSIER_FORBIDDEN_IDENTIFIERS secret. No-op
      # until the secret is configured, so it never blocks a fresh clone.
      # Also enforces the always-on samples/ guard (no tracked files under
      # gitignored data directories).
      - name: Denylist identifier gate
        env:
          DOSSIER_FORBIDDEN_IDENTIFIERS: ${{ secrets.DOSSIER_FORBIDDEN_IDENTIFIERS }}
        run: python3 scripts/check_committed_identifiers.py

      - name: Scan for secrets
        run: |
          set -e
          # Look for hardcoded secrets: assignments of string/bytes literals to
          # variables whose names suggest sensitive values. Function calls,
          # variable references, and type annotations are not secrets.
          HITS=$(grep -rnE "(password|secret|api_key|apikey|access_token|auth_token|dsn|secret_key|private_key)[[:space:]]*=[[:space:]]*[fb]?[\"']" \
            src/ tests/ --include='*.py' \
            | grep -vE '(test_|example|placeholder|changeme|replace|dummy|sample|TODO|test-session-secret)' \
            || true)
          if [ -n "$HITS" ]; then
            echo "Potential hardcoded secrets found (review each):"
            echo "$HITS"
            exit 1
          fi
          echo "No secrets detected."

  # Container image build + publish (Plan 013 WI-2.1)
  image:
    runs-on: ubuntu-latest
    needs: [check, identifier-gate]
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Read regista pin from SUITE.lock
        id: pin
        run: |
          echo "ref=$(grep 'ref:' SUITE.lock | head -1 | awk '{print $2}')" >> "$GITHUB_OUTPUT"
          echo "version=$(grep 'version:' SUITE.lock | head -1 | awk '{print $2}' | tr -d '"')" >> "$GITHUB_OUTPUT"

      - name: Build image
        run: |
          docker build \
            --build-arg REGISTA_REF=${{ steps.pin.outputs.ref }} \
            -t ghcr.io/hraedon/dossier:latest \
            -t ghcr.io/hraedon/dossier:${{ steps.pin.outputs.version }}-${{ steps.pin.outputs.ref }} \
            .

      - name: Push image
        if: github.ref == 'refs/heads/main'
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
          docker push ghcr.io/hraedon/dossier:latest
          docker push ghcr.io/hraedon/dossier:${{ steps.pin.outputs.version }}-${{ steps.pin.outputs.ref }}
