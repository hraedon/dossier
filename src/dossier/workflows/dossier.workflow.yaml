# dossier MVP workflow — the declared state machine regista enforces.
# DRAFT: validate against the installed regista with `regista` workflow lint
# before relying on it (regista 0.4.0 workflow schema).
#
# Design intent lives in docs/provenance-model.md; review semantics in
# plans/005-adversarial-review.md. The status model is fixed (not configurable),
# and `done` is reachable ONLY through adversarial review (`in_review`), except a
# pre-work triage close from `open`.

name: dossier
version: 1
regista_version: "0.4.0"

# Fixed status model. `open` is the entry state; `done` is terminal. `in_review`
# is a MANDATORY gate on the path to done — review is structural, not a flag.
states:
  - name: open
    initial: true
  - name: in_progress
  - name: blocked
  - name: in_review
  - name: done
    terminal: true

# Who may act. MVP keeps roles coarse: any authenticated member may move work;
# `system` is reserved for regista/maintenance. The adversarial property of review
# is NOT enforced by role (a role can't tell self-review from independent review);
# it is enforced by the `adversarial_review` validator (plans/005).
roles:
  - name: member
  - name: system

transitions:
  - name: start
    from: open
    to: in_progress
    allowed_roles: [member]

  - name: block
    from: in_progress
    to: blocked
    allowed_roles: [member]
  - name: unblock
    from: blocked
    to: in_progress
    allowed_roles: [member]

  # Hand work to review. The submitter is recorded as (an) author for the
  # distinct-reviewer check.
  - name: submit_for_review
    from: in_progress
    to: in_review
    allowed_roles: [member]

  # The two adversarial-review exits. BOTH gate on `adversarial_review`:
  # the acting reviewer must be a different actor than the work's author(s), and
  # (per plans/005) agent-authored work requires a human reviewer. Rejection is a
  # first-class, expected outcome — not an error path.
  - name: request_changes        # adversarial review found problems -> back to work
    from: in_review
    to: in_progress
    allowed_roles: [member]
    validator: adversarial_review
  - name: accept                 # review attests the work -> done
    from: in_review
    to: done
    allowed_roles: [member]
    validator: adversarial_review

  - name: reopen
    from: done
    to: open
    allowed_roles: [member]

  # The ONE review-exempt path: dismissing an item before any work (won't-fix /
  # duplicate). Valid only from `open`; anything that did work goes through review.
  - name: close_from_open
    from: open
    to: done
    allowed_roles: [member]

# Issue types. `assignee` is a custom field for the MVP (regista *claims* are the
# richer "who is actively working this" model — deferred). `team` (Plan 004) scopes
# writes. `priority` is an enum for render/filter.
work_item_types:
  - name: bug
    custom_fields:
      - name: team
        type: string
        required: false
        ui_visible: true
      - name: assignee
        type: string
        required: false
        ui_visible: true
      - name: priority
        type: enum
        enum_values: [low, normal, high, urgent]
        default: normal
        ui_visible: true
  - name: task
    custom_fields:
      - name: team
        type: string
        required: false
        ui_visible: true
      - name: assignee
        type: string
        required: false
        ui_visible: true
      - name: priority
        type: enum
        enum_values: [low, normal, high, urgent]
        default: normal
        ui_visible: true

# No cross-issue links in the MVP (scope: out). link_types intentionally omitted.
