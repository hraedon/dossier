# Dossier k8s deployment — apply with: kubectl apply -k deploy/k8s/
#
# Operator prerequisites before first apply:
#   1. python scripts/gen-k8s-secret.py   (generates secret-suite-env.yaml + configmap-ad-root-ca.yaml)
#   2. Create secret-regista-keys.yaml from the break-glass keys.json (see docs/key-operations.md §7)
#
# The two Secret manifests and the ConfigMap are gitignored (operator-generated).
# All other manifests are committed.

apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - namespace.yaml
  - configmap-project-acl.yaml
  - configmap-ad-root-ca.yaml
  - secret-suite-env.yaml
  - secret-regista-keys.yaml
  - deployment.yaml
  - service.yaml
  - ingress.yaml
