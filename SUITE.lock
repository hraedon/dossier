# SUITE.lock — the known-good version matrix for the dossier container image.
#
# Update the regista_ref and Dockerfile ARG together. The CI image-build job
# reads this file to verify the pin matches.

component: dossier
version: "0.0.1"
python: "3.13"

regista:
  ref: dd22197eaafe11afabdae488b6908a5729b3b343
  source: github.com/hraedon/regista
  # Pin to a commit SHA, never a branch. The face and the spine version
  # are a known-good pair recorded here.
  # Bumped 2026-07-09: Plan 015 adopts regista Plan 029's backend-aware
  # custody (regista._custody.store_private_key), which postdates the
  # previous pin (11c82b1, Plan 026).

container:
  registry: ghcr.io
  image: hraedon/dossier
  # Tag strategy: :latest for the tip, :<dossier-version> for releases,
  # :<dossier-version>-<regista-short-sha> for reproducible pinning.
